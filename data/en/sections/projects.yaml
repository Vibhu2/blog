projects:
- name: Azure AD Sync Monitor
  role: Author
  timeline: "2022 - Present"
  url: "https://github.com/Vibhu2/VBPowershell"
  summary: "PowerShell automation monitoring Azure AD Connect sync across 155+ MSP clients. Auto-triggers forced sync when threshold is exceeded and reports failures — eliminated daily manual checks entirely."
  tags: ["powershell", "azure"]

- name: ESXi Reporting Automation
  role: Author
  timeline: "2021 - Present"
  url: "https://github.com/Vibhu2/VBPowershell"
  summary: "Automated ESXi host inventory and documentation generation across client environments. Reduced monthly reporting from 10 days → under 1 hour by pulling host data via PowerCLI and generating structured reports."
  tags: ["powershell", "infrastructure"]

- name: Workstation Profile Scanner
  role: Author
  timeline: "2020 - Present"
  url: "https://www.powershellgallery.com/packages/VB.WorkstationReport"
  summary: "Enumerates all user profiles, mapped printers, and default printer settings across network machines. Critical input for 22+ server migration projects — eliminated weeks of manual pre-migration discovery work."
  tags: ["powershell", "infrastructure"]

- name: Automate/ScreenConnect Reconciliation
  role: Author
  timeline: "2021 - Present"
  url: "https://github.com/Vibhu2/VBPowershell"
  summary: "API-driven PowerShell script detecting record discrepancies between ConnectWise Automate and ScreenConnect, with automated service restart for affected endpoints — saves ~2 hours per incident response."
  tags: ["powershell", "infrastructure"]

- name: VB.WorkstationReport
  role: Author
  timeline: "Apr 2026 - Present"
  url: "https://www.powershellgallery.com/packages/VB.WorkstationReport"
  summary: "PSGallery module for end-to-end workstation auditing in MSP environments. Collects user profiles, printer mappings, folder redirections, OneDrive backup status, Sync Center state, and network interfaces — all orchestrated via a single Invoke-VBWorkstationReport call with optional Nextcloud upload."
  tags: ["powershell", "psgallery", "infrastructure"]

- name: VB.NextCloud
  role: Author
  timeline: "Apr 2026 - Present"
  url: "https://www.powershellgallery.com/packages/VB.NextCloud"
  summary: "PSGallery module providing WebDAV utilities for Nextcloud from PowerShell. Single-file upload via PUT (Set-VBNextcloudFile), batch orchestration with auto folder creation (Start-VBNextcloudUpload), and PROPFIND-based directory and folder listing — enabling fully automated file sync workflows."
  tags: ["powershell", "psgallery"]

- name: VB.ServerInventory
  role: Author
  timeline: "Apr 2026 - Present"
  url: "https://www.powershellgallery.com/packages/VB.ServerInventory"
  summary: "PSGallery module with 34 cmdlets across 10 categories for comprehensive Windows Server auditing — system/disk/network, AD health, GPO analysis, security (BitLocker, firewall, Azure AD join), DHCP/DNS, RDS, installed apps, Windows features, scheduled tasks, and shares. Built for pre-migration discovery and MSP documentation."
  tags: ["powershell", "psgallery", "infrastructure"]

- name: VBPowershell Module Library
  role: Author
  timeline: "2023 - Present"
  url: "https://github.com/Vibhu2/VBPowershell"
  summary: Personal PowerShell module library for Windows Server administration — AD management, Exchange operations, reporting, and MSP tooling built to production standards.
  tags: ["powershell"]
