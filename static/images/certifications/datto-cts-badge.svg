<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B2A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007f79;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="url(#ringGrad)" filter="url(#shadow)"/>

  <!-- Inner circle background -->
  <circle cx="100" cy="100" r="86" fill="url(#bgGrad)"/>

  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#00B2A9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Star/shield icon area -->
  <!-- Ribbon top -->
  <path d="M100 30 L110 50 L132 53 L116 69 L120 91 L100 80 L80 91 L84 69 L68 53 L90 50 Z"
        fill="#00B2A9" opacity="0.95"/>
  <!-- Star highlight -->
  <path d="M100 36 L108 52 L126 54 L113 67 L116 85 L100 76 L84 85 L87 67 L74 54 L92 52 Z"
        fill="#00d4ca" opacity="0.3"/>

  <!-- DATTO text -->
  <text x="100" y="115" font-family="Arial, Helvetica, sans-serif" font-size="22"
        font-weight="800" fill="#00B2A9" text-anchor="middle" letter-spacing="3">DATTO</text>

  <!-- Divider line -->
  <line x1="50" y1="122" x2="150" y2="122" stroke="#00B2A9" stroke-width="1" opacity="0.6"/>

  <!-- CERTIFIED text -->
  <text x="100" y="138" font-family="Arial, Helvetica, sans-serif" font-size="9.5"
        font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>

  <!-- TECHNICAL text -->
  <text x="100" y="152" font-family="Arial, Helvetica, sans-serif" font-size="9.5"
        font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">TECHNICAL</text>

  <!-- SPECIALIST text -->
  <text x="100" y="166" font-family="Arial, Helvetica, sans-serif" font-size="9.5"
        font-weight="600" fill="#00B2A9" text-anchor="middle" letter-spacing="1.5">SPECIALIST</text>
</svg>
