<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18">
  <!-- Exchange Online: cloud-hosted envelope, matches Fluent icon style -->
  <defs>
    <linearGradient id="eo-a" x1="9" y1="1" x2="9" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35b8f1"/>
      <stop offset="1" stop-color="#0078d4"/>
    </linearGradient>
  </defs>
  <!-- envelope body -->
  <rect x="1" y="4" width="16" height="10" rx="1.2" fill="url(#eo-a)"/>
  <!-- envelope flap / V crease -->
  <polyline points="1,4 9,10 17,4" fill="none" stroke="#c3f1ff" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- cloud badge top-right -->
  <circle cx="14" cy="4.5" r="2.8" fill="#50E6FF"/>
  <circle cx="15.8" cy="5.5" r="2" fill="#50E6FF"/>
  <rect x="13" y="5.5" width="4" height="1.8" rx="0" fill="#50E6FF"/>
  <!-- bottom bar (desktop stand like exchange.svg) -->
  <path d="M6 14h6l.5 2H5.5L6 14z" fill="#888"/>
  <rect x="4.5" y="16" width="9" height="1" rx="0.4" fill="#aaa"/>
</svg>
