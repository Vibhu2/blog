# section information
section:
  name: Articles
  id: publications
  enable: true
  weight: 7
  showOnNavbar: true

# Master category list — priority ordered, max 8 buttons shown at once.
# A button appears only when >=1 published post carries a matching tag.
# To add a new category: append an entry here and tag your posts.
categories:
- label: "PowerShell"
  filter: "powershell"
  tags: ["PowerShell"]

- label: "Automation"
  filter: "automation"
  tags: ["Automation"]

- label: "Active Directory"
  filter: "active-directory"
  tags: ["Active Directory"]

- label: "Azure"
  filter: "azure"
  tags: ["Azure", "Azure AD", "Entra ID"]

- label: "M365"
  filter: "m365"
  tags: ["M365", "Microsoft 365", "Exchange Online", "Teams"]

- label: "Intune / RMM"
  filter: "intune-rmm"
  tags: ["Intune", "RMM"]

- label: "Windows Admin"
  filter: "windows"
  tags: ["Windows", "Windows Administration"]

- label: "Server"
  filter: "server"
  tags: ["Server", "Windows Server"]

- label: "Linux"
  filter: "linux"
  tags: ["Linux"]
